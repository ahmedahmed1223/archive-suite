name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  laravel-next:
    name: Laravel + Next verification
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_RELEASE: ${{ github.sha }}
      SENTRY_ENVIRONMENT: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify reproducibility pins
        run: pnpm run verify:reproducibility

      - name: Verify cutover defaults
        run: pnpm run verify:cutover

      - name: Verify API contracts
        run: pnpm run verify:api-contracts

      - name: Typecheck Next.js
        run: pnpm run typecheck:next

      - name: Build Next.js
        run: pnpm run build:next

      - name: Verify repository hygiene
        run: pnpm run verify:repo-hygiene

      - name: Verify infrastructure config
        run: pnpm run verify:infra

      - name: Run Laravel tests
        run: pnpm run verify:laravel

      - name: Verify release wiring
        run: node scripts/verify-release-readiness.mjs

  live-integration:
    name: Live Laravel + Next integration (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @archive/next exec playwright install --with-deps chromium

      # Launches a Laravel container (self-provisions .env from .env.example,
      # migrates+seeds NextIntegrationSeeder) plus a Next.js production build,
      # then runs the integration spec and the axe-core a11y gate
      # (e2e/accessibility.spec.ts) against both. See
      # scripts/verify-next-laravel-live.mjs.
      - name: Run live Laravel/Next integration
        run: pnpm run verify:laravel-next:live

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-integration
          path: |
            archive-next/playwright-report/
            archive-next/test-results/
          retention-days: 7
          if-no-files-found: ignore

  security:
    name: Security gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security baseline
        run: pnpm run security:baseline

      - name: Run dependency audit
        run: pnpm run security:audit

      # ponytail: continue-on-error because `composer audit` currently fails
      # only on 2 abandoned-package advisories (league/flysystem-azure-blob-storage,
      # microsoft/azure-storage-blob) -- zero vulnerability advisories, verified
      # locally 2026-07-13. Flip to blocking once those packages are replaced.
      - name: Composer audit (Laravel)
        continue-on-error: true
        run: node scripts/laravel-docker.mjs composer audit
