name: Docker

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - "archive-next/**"
      - "archive-laravel/**"
      - "infra/docker-compose.yml"
      - "infra/docker-compose.laravel-next.yml"
      - "infra/deploy/Caddyfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  push:
    branches:
      - master
      - main
  # Tag pushes are handled by release.yml (full verification gate before
  # publish). This workflow only builds for PR/branch validation, plus a
  # manual escape hatch below.
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NEXT_IMAGE: ghcr.io/${{ github.repository }}/masar-next
  LARAVEL_IMAGE: ghcr.io/${{ github.repository }}/masar-laravel

jobs:
  build:
    name: Build default Docker stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render default Compose config
        run: docker compose --env-file infra/.env.example -f infra/docker-compose.yml config

      - name: Build Next image from default Compose
        run: docker compose --env-file infra/.env.example -f infra/docker-compose.yml build next

  publish:
    name: Publish images to GHCR (manual only — releases go through release.yml)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          echo "version=manual-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Next image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: archive-next/Dockerfile
          push: true
          tags: ${{ env.NEXT_IMAGE }}:${{ steps.meta.outputs.version }}
          build-args: |
            ARCHIVE_API_BASE_URL=http://laravel:8000/api/v1
            SENTRY_ENVIRONMENT=production
            SENTRY_RELEASE=${{ steps.meta.outputs.version }}

      - name: Build and push Laravel image
        uses: docker/build-push-action@v6
        with:
          context: archive-laravel
          file: archive-laravel/Dockerfile.worker
          push: true
          tags: ${{ env.LARAVEL_IMAGE }}:${{ steps.meta.outputs.version }}
