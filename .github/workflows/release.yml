name: Release

# Official releases: pushing a v* tag runs the FULL verification gate first,
# then publishes images and a GitHub Release. Nothing ships unverified.
# Every release publishes only its explicit version tag. Deployments consume
# the version + digest references attached in release-images.txt.

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a running release

permissions: {}

env:
  NEXT_IMAGE: ghcr.io/${{ github.repository }}/masar-next
  LARAVEL_IMAGE: ghcr.io/${{ github.repository }}/masar-laravel

jobs:
  verify:
    name: Full release gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Release gate (verify + security + readiness)
        run: pnpm run release:verify

  publish:
    name: Publish images + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: pnpm

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:2.9.5

      - name: Install dependencies for license inventories
        run: |
          pnpm install --frozen-lockfile
          composer install --working-dir=archive-laravel --no-dev --no-interaction --no-scripts

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Classify release
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          # Semver prerelease = anything with a dash (v1.0.0-rc.1, v2.0.0-beta.2)
          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      # sbom+provenance: BuildKit attaches SPDX SBOM and SLSA provenance
      # attestations to the pushed image (V1-205 supply chain).
      - name: Build and push Next image
        id: push_next
        uses: docker/build-push-action@v6
        with:
          context: .
          file: archive-next/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.NEXT_IMAGE }}:${{ steps.meta.outputs.version }}
          build-args: |
            ARCHIVE_API_BASE_URL=http://laravel:8000/api/v1
            SENTRY_ENVIRONMENT=production
            SENTRY_RELEASE=${{ steps.meta.outputs.version }}

      - name: Build and push Laravel image
        id: push_laravel
        uses: docker/build-push-action@v6
        with:
          context: archive-laravel
          file: archive-laravel/Dockerfile.worker
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.LARAVEL_IMAGE }}:${{ steps.meta.outputs.version }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign immutable image digests (keyless OIDC)
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${NEXT_IMAGE}@${{ steps.push_next.outputs.digest }}"
          cosign sign "${LARAVEL_IMAGE}@${{ steps.push_laravel.outputs.digest }}"

      - name: Verify keyless image signatures
        shell: bash
        run: |
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          issuer="https://token.actions.githubusercontent.com"
          cosign verify --certificate-identity "${identity}" --certificate-oidc-issuer "${issuer}" "${NEXT_IMAGE}@${{ steps.push_next.outputs.digest }}"
          cosign verify --certificate-identity "${identity}" --certificate-oidc-issuer "${issuer}" "${LARAVEL_IMAGE}@${{ steps.push_laravel.outputs.digest }}"

      # Air-gapped artifact is produced only from the two signature-verified
      # application digests plus the pinned core runtime images.
      - name: Build offline bundle
        shell: bash
        env:
          NEXT_IMAGE: "${{ env.NEXT_IMAGE }}@${{ steps.push_next.outputs.digest }}"
          LARAVEL_IMAGE: "${{ env.LARAVEL_IMAGE }}@${{ steps.push_laravel.outputs.digest }}"
        run: |
          node scripts/offline-bundle.mjs build "${{ steps.meta.outputs.version }}" release-offline
          node scripts/offline-bundle.mjs verify "release-offline/archive-suite-offline-${{ steps.meta.outputs.version }}"

      - name: Export Next image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.NEXT_IMAGE }}@${{ steps.push_next.outputs.digest }}"
          format: spdx-json
          output-file: next-image.spdx.json
          upload-artifact: false

      - name: Export Laravel image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.LARAVEL_IMAGE }}@${{ steps.push_laravel.outputs.digest }}"
          format: spdx-json
          output-file: laravel-image.spdx.json
          upload-artifact: false

      - name: Generate and enforce dependency license inventories
        shell: bash
        run: |
          pnpm licenses list --prod --json > pnpm-licenses.json
          composer licenses --working-dir=archive-laravel --format=json --no-dev > composer-licenses.json
          node scripts/verify-release-licenses.mjs pnpm-licenses.json composer-licenses.json

      - name: Smoke Next image
        shell: bash
        run: |
          container_id="$(docker run --detach --publish 127.0.0.1::3000 "${NEXT_IMAGE}:${{ steps.meta.outputs.version }}")"
          trap 'docker rm --force "${container_id}"' EXIT
          port="$(docker port "${container_id}" 3000/tcp | sed 's/.*://')"
          for attempt in {1..30}; do
            curl --fail --silent --show-error "http://127.0.0.1:${port}/" >/dev/null && exit 0
            sleep 2
          done
          docker logs "${container_id}"
          exit 1

      - name: Smoke Laravel image
        shell: bash
        run: docker run --rm --env ARCHIVE_SECURE_COOKIES=true "${LARAVEL_IMAGE}:${{ steps.meta.outputs.version }}" php artisan --version

      - name: Scan Next image (fail on fixable critical vulnerabilities)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "${{ env.NEXT_IMAGE }}:${{ steps.meta.outputs.version }}"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan Laravel image (fail on fixable critical vulnerabilities)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "${{ env.LARAVEL_IMAGE }}:${{ steps.meta.outputs.version }}"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      # Immutable reference manifest: deploy by digest, not by mutable tag.
      - name: Write image digests manifest
        shell: bash
        run: |
          cat > release-images.txt <<EOF
          # Masar ${GITHUB_REF_NAME} — immutable image references (deploy by digest)
          ${NEXT_IMAGE}:${{ steps.meta.outputs.version }}@${{ steps.push_next.outputs.digest }}
          ${LARAVEL_IMAGE}:${{ steps.meta.outputs.version }}@${{ steps.push_laravel.outputs.digest }}
          EOF
          cat release-images.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          offline_bundle="release-offline/archive-suite-offline-${{ steps.meta.outputs.version }}.tar.gz"
          offline_asset="$(basename "${offline_bundle}")"
          cp "${offline_bundle}" "${offline_asset}"
          artifacts=(release-images.txt next-image.spdx.json laravel-image.spdx.json pnpm-licenses.json composer-licenses.json "${offline_asset}")
          sha256sum "${artifacts[@]}" > SHA256SUMS
          sha256sum --check SHA256SUMS
          flags=(--generate-notes --title "${GITHUB_REF_NAME}")
          [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]] && flags+=(--prerelease)
          gh release create "${GITHUB_REF_NAME}" "${flags[@]}" release-images.txt next-image.spdx.json laravel-image.spdx.json pnpm-licenses.json composer-licenses.json "${offline_asset}" SHA256SUMS
