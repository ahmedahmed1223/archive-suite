<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>أرشيف الفيديو - Video Archive</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23031212'/%3E%3Cpath d='M17 18h30a4 4 0 0 1 4 4v20a4 4 0 0 1-4 4H17a4 4 0 0 1-4-4V22a4 4 0 0 1 4-4Z' fill='%2310b981'/%3E%3Cpath d='M28 25v14l12-7-12-7Z' fill='%23ffffff'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="نظام إدارة أرشيف الفيديو المحلي - Local Video Archive Management System"
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("videoArchive:theme");
          var theme = stored || "dark";
          var resolved = theme;
          if (theme === "system") {
            resolved = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.classList.add(resolved);
        } catch (error) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      html.dark {
        background: #030712;
      }

      html.light {
        background: #ffffff;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
