<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل — Archive Suite</title>
  <style>
    :root {
      --bg: #060e1a; --surface: #0c1726; --border: rgba(255,255,255,.08);
      --text: #f8fafc; --muted: #94a3b8; --accent: #14b8a6; --accent-strong: #0d9488;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f4ee; --surface: #fffdf9; --border: rgba(15,23,42,.10);
        --text: #14202e; --muted: #5b6b7b; --accent: #0d9488; --accent-strong: #0f766e;
      }
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      font-family: "IBM Plex Sans Arabic", system-ui, "Segoe UI", Tahoma, Arial, sans-serif;
      line-height: 1.7;
    }
    .card {
      width: 100%; max-width: 420px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 2.5rem 2rem;
      box-shadow: 0 24px 50px -16px rgba(0,0,0,.35);
    }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 1.25rem; display: flex;
      align-items: center; justify-content: center; border-radius: 16px;
      background: color-mix(in oklab, var(--accent) 14%, transparent);
      color: var(--accent);
    }
    .icon svg { width: 30px; height: 30px; }
    h1 { font-size: 1.3rem; font-weight: 600; margin: 0 0 .5rem; }
    p { color: var(--muted); margin: 0 auto 1.5rem; max-width: 32ch; font-size: .95rem; }
    button {
      background: var(--accent); color: #04211c; border: none; cursor: pointer;
      padding: .7rem 1.5rem; border-radius: 10px; font-size: .95rem; font-weight: 600;
      font-family: inherit; transition: filter .15s ease;
    }
    button:hover { filter: brightness(1.06); }
    button:focus-visible { outline: 2px solid var(--accent-strong); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>تحقّق من اتصالك بالشبكة وأعد المحاولة. سيتم استرجاع المحتوى المحفوظ تلقائيًا عند عودة الاتصال.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
