name: CI

# بوابة جودة النواة: اختبارات العقد (بلا اعتماديات، Node فقط) على PRs/main.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify contract
        run: node scripts/verify-core.mjs
