# V1-202: nginx front for the laravel-fpm container. Serves static files
# directly and proxies PHP requests over FastCGI to the laravel-fpm service
# (php-fpm listening on :9000 — the base php:8.4-fpm image's default pool).
# Port 8000 preserves the existing internal DNS contract: other services
# (next.config rewrites, healthchecks) all point at http://laravel:8000.
server {
    listen 8000;
    server_name _;
    root /app/public;
    index index.php;

    # No independent cap here — delegate entirely to PHP's
    # upload_max_filesize/post_max_size, same as the old `php -S` dev server
    # which had no HTTP-layer limit of its own.
    client_max_body_size 0;

    access_log /dev/stdout;
    error_log /dev/stderr;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass laravel-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
