; Opt-in alternative to the default two-container split (see V1-202 note in
; ../../Dockerfile.worker and infra/docker-compose.laravel-next.yml). Not used
; by the canonical compose stack — it runs nginx and laravel-fpm as two
; single-process containers instead, deliberately avoiding a supervisor.
;
; Use this only for a single-container deployment (e.g. a platform that only
; accepts one process per container image, such as some managed-PaaS
; offerings): `docker run ... archive-laravel-worker supervisord -c
; /etc/supervisor/conf.d/all-in-one.conf` runs nginx + php-fpm together in
; one container. It does not run the queue worker or scheduler — add
; `[program:queue-worker]` / `[program:scheduler]` blocks below if a
; deployment truly needs everything in a single container.

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm --nodaemonize
autostart=true
autorestart=true
startretries=3
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=3
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
