services:
  - type: web
    name: archive-suite-frontend
    runtime: docker
    plan: starter
    dockerfilePath: archive-server/Dockerfile.frontend
    healthCheckPath: /
    envVars:
      - key: VITE_BACKEND
        value: cloud
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: archive-suite-server
          property: host

  - type: web
    name: archive-suite-server
    runtime: docker
    plan: starter
    dockerfilePath: archive-server/Dockerfile.server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND
        value: postgres
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: archive-suite-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_AUTH_SECRET
        generateValue: true
      - key: JWT_SHARE_SECRET
        generateValue: true
      - key: OAUTH_STATE_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: archive-suite-postgres
    databaseName: archive
    user: archive
    plan: starter
