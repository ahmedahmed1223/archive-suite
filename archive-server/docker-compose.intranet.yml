# Intranet override — internal (LAN) access without a public domain or TLS.
#
# Used by the guided wizard when "access mode = internal". The frontend nginx
# is published directly on a host port so staff reach the app at
# http://SERVER_IP:8080 over the internal network. Caddy (public TLS edge) is
# disabled — there is no domain to request a Let's Encrypt cert for yet.
#
# Switch to public later by re-running the wizard in "public" mode (sets
# DOMAIN/ACME_EMAIL and drops this override so Caddy fronts 80/443).
#
# Usage:
#   docker compose -f docker-compose.postgres.yml -f docker-compose.intranet.yml up -d --build

services:
  # Publish the SPA + API (nginx proxies /api/* to the server) on the LAN.
  # 0.0.0.0:8080 so other machines on the internal network can reach it.
  frontend:
    ports:
      - "8080:80"

  # No public edge in intranet mode — Caddy only matters once a real domain
  # exists. Parking it under an inactive profile keeps it out of `up`.
  caddy:
    profiles: ["disabled"]

  # Relax the production secret guard for an internal deployment. Secrets are
  # still generated by the wizard; this only allows internal HTTP without a domain.
  server:
    environment:
      ARCHIVE_PUBLIC_DEPLOY: "0"
