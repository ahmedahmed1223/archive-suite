# Lite override — for resource-constrained hosts (small office machine, small VPS).
#
# Drops the heavy/optional services that the full production stack enables by
# default: Whisper (speech-to-text, multi-GB models), PaddleOCR (heavy build),
# and the Prometheus/Grafana monitoring pair. The core stays intact:
# postgres + redis + server + frontend + pgadmin (+ caddy unless intranet).
#
# Requires Compose v2.24+ for the `!override` tag (Docker Compose v5 here).
#
# Usage (full/public, lite):
#   docker compose -f docker-compose.postgres.yml -f docker-compose.lite.yml up -d --build
# Usage (intranet, lite):
#   docker compose -f docker-compose.postgres.yml -f docker-compose.intranet.yml -f docker-compose.lite.yml up -d --build

services:
  # The base stack makes `server` wait for whisper to be healthy. With whisper
  # disabled we must replace depends_on entirely (merge cannot remove keys),
  # leaving only the services that actually run in lite mode.
  server:
    depends_on: !override
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # No transcription backend in lite mode — keep the feature dormant.
      TRANSCRIBE_PROVIDER: ""
      TRANSCRIBE_BASE_URL: ""

  whisper:
    profiles: ["disabled"]
  ocr:
    profiles: ["disabled"]
  prometheus:
    profiles: ["disabled"]
  grafana:
    profiles: ["disabled"]
