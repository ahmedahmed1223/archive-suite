# Postgres variant — use INSTEAD of docker-compose.yml when you want
# PostgreSQL as the cloud backend. The PocketBase service is omitted entirely.
#
# Usage:
#   cp .env.example .env       # set DOMAIN + ACME_EMAIL + POSTGRES_PASSWORD + auth secrets
#   docker compose -f docker-compose.postgres.yml up -d --build
#
# Switching backends later: bring this stack down, copy a snapshot via the
# SPA's export, bring docker-compose.yml up, import the snapshot. Snapshot
# format is identical across both backends — no data loss.

services:
  postgres:
    image: postgres:18-alpine
    container_name: archive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-archive}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archive} -d ${POSTGRES_DB:-archive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Runs `prisma migrate deploy` on startup, then serves the RPC API the SPA's
  # cloud-http adapter calls. nginx (inside the frontend image) proxies /api/*
  # to this service on the internal network.
  server:
    build:
      context: ..
      dockerfile: archive-server/Dockerfile.server
    container_name: archive-server
    restart: unless-stopped
    environment:
      BACKEND: postgres
      NODE_ENV: production
      ARCHIVE_PUBLIC_DEPLOY: ${ARCHIVE_PUBLIC_DEPLOY:-1}
      DATABASE_URL: ${DATABASE_URL:-postgresql://archive:${POSTGRES_PASSWORD}@postgres:5432/archive}
      API_PORT: "8787"
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TTL_SEC: ${JWT_TTL_SEC:-43200}
      SHARE_EXPIRY_DAYS: ${SHARE_EXPIRY_DAYS:-30}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RATE_LIMIT_RPC_MAX: ${RATE_LIMIT_RPC_MAX:-600}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-10}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      REDIS_URL: ${REDIS_URL:-}
      FILE_STORE: ${FILE_STORE:-disk}
      FILE_STORE_DIR: ${FILE_STORE_DIR:-/app/files}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_IMPL: ${AI_IMPL:-sdk}
      TRANSCRIBE_PROVIDER: ${TRANSCRIBE_PROVIDER:-}
      TRANSCRIBE_API_KEY: ${TRANSCRIBE_API_KEY:-}
      TRANSCRIBE_MODEL: ${TRANSCRIBE_MODEL:-}
      TRANSCRIBE_BASE_URL: ${TRANSCRIBE_BASE_URL:-http://whisper:8000/v1}
      # Persisted server config (admin DB settings, set from the app) lives here
      # and overrides the env DATABASE_URL on the next boot.
      SERVER_CONFIG_PATH: /app/config/server-config.json
    volumes:
      - server_config:/app/config
      - server_files:/app/files
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: archive-server/Dockerfile.frontend
    container_name: archive-frontend
    restart: unless-stopped
    # Postgres stack proxies /api/* to the Node server (overrides the image's
    # default pocketbase conf).
    volumes:
      - ./nginx/postgres.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - archive

  caddy:
    image: caddy:2.11-alpine
    container_name: archive-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - archive

  # Optional Redis cache — caches search results and share snapshots.
  # Only starts with: docker compose --profile cache up -d
  # Then set REDIS_URL=redis://redis:6379 in .env (or the server environment).
  redis:
    image: redis:7-alpine
    container_name: archive-redis
    profiles: ["cache"]
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - archive

  # Optional self-hosted Whisper (OpenAI-compatible /v1/audio/transcriptions).
  # Only starts with: docker compose --profile whisper up -d
  # Then set TRANSCRIBE_PROVIDER=whisper-local in .env (no API key needed).
  # CPU image by default; swap the tag for a CUDA build on a GPU VPS.
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: archive-whisper
    profiles: ["whisper"]
    restart: unless-stopped
    environment:
      WHISPER__MODEL: ${TRANSCRIBE_MODEL:-Systran/faster-whisper-base}
    volumes:
      - whisper_models:/root/.cache/huggingface
    networks:
      - archive

  # pgAdmin — web-based Postgres management UI.
  # Only starts with: docker compose --profile pgadmin up -d
  # Access at http://localhost:5050 (or behind Caddy: https://DOMAIN/pgadmin)
  # IMPORTANT: bind to internal network only; never expose port 5050 publicly.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: archive-pgadmin
    profiles: ["pgadmin"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?Set PGADMIN_EMAIL in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "True"
      # Disable the pgAdmin dashboard query statistics (reduces noise)
      PGADMIN_CONFIG_SESSION_DB_PATH: /var/lib/pgadmin/sessions
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./deploy/pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - archive

  # To expose pgAdmin through Caddy (recommended over opening port 5050):
  # Add to Caddyfile:  pgadmin.DOMAIN { reverse_proxy pgadmin:80 }
  # Then remove the ports: entry from the pgadmin service above.

  # Prometheus — scrapes /metrics from the archive-server every 15 s.
  # Only starts with: docker compose --profile monitoring up -d
  # Access at http://localhost:9090 (local-only; never expose publicly).
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: archive-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    networks:
      - archive

  # Grafana — dashboards backed by Prometheus.
  # Only starts with: docker compose --profile monitoring up -d
  # Access at http://localhost:3000 (local-only; never expose publicly).
  # Default credentials: admin / ${GRAFANA_PASSWORD:-admin123}
  grafana:
    image: grafana/grafana:11.4.0
    container_name: archive-grafana
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [prometheus]
    restart: unless-stopped
    networks:
      - archive

  # PaddleOCR3 service — Arabic/multilingual OCR for uploaded images.
  # Start with: docker compose --profile ocr up -d
  # Then set OCR_SERVICE_URL=http://ocr:8788 in .env
  ocr:
    build:
      context: ./ocr-service
    container_name: archive-ocr
    profiles: ["ocr"]
    restart: unless-stopped
    environment:
      OCR_LANG: ${OCR_LANG:-ar}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      MAX_FILE_SIZE_MB: ${OCR_MAX_FILE_MB:-20}
    volumes:
      - ocr_models:/root/.paddleocr
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8788/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  server_config:
  server_files:
  caddy_data:
  caddy_config:
  whisper_models:
  pgadmin_data:
  ocr_models:
  prometheus_data:
  grafana_data:

networks:
  archive:
    driver: bridge
