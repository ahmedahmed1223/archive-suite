# Archive Suite Production Stack (Postgres + All Services)
# Without Whisper (image unavailable)

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: archive-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-archive}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archive} -d ${POSTGRES_DB:-archive}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  server:
    build:
      context: ..
      dockerfile: archive-server/Dockerfile.server
    container_name: archive-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /app/.archive-files
    environment:
      BACKEND: postgres
      NODE_ENV: production
      ARCHIVE_PUBLIC_DEPLOY: ${ARCHIVE_PUBLIC_DEPLOY:-1}
      DATABASE_URL: ${DATABASE_URL:-postgresql://archive:${POSTGRES_PASSWORD}@postgres:5432/archive}
      API_PORT: "8787"
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_AUTH_SECRET: ${JWT_AUTH_SECRET:-}
      JWT_SHARE_SECRET: ${JWT_SHARE_SECRET:-}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}
      JWT_TTL_SEC: ${JWT_TTL_SEC:-43200}
      SHARE_EXPIRY_DAYS: ${SHARE_EXPIRY_DAYS:-30}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      RATE_LIMIT_RPC_MAX: ${RATE_LIMIT_RPC_MAX:-600}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-10}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      FILE_STORE: ${FILE_STORE:-disk}
      FILE_STORE_DIR: ${DOCKER_FILE_STORE_DIR:-/app/files}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_IMPL: ${AI_IMPL:-sdk}
      TRANSCRIBE_PROVIDER: ${TRANSCRIBE_PROVIDER:-whisper-local}
      TRANSCRIBE_BASE_URL: ${TRANSCRIBE_BASE_URL:-http://whisper:8000/v1}
      TRANSCRIBE_MODEL: ${TRANSCRIBE_MODEL:-Systran/faster-whisper-base}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr:8788}
      SERVER_CONFIG_PATH: /app/config/server-config.json
    volumes:
      - server_config:/app/config
      - server_files:/app/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

  frontend:
    build:
      context: ..
      dockerfile: archive-server/Dockerfile.frontend
    container_name: archive-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx
      - /tmp
    volumes:
      - ./nginx/postgres.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - archive
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  caddy:
    image: caddy:2.11-alpine
    container_name: archive-caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /run
      - /tmp
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - archive
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: archive-redis
    command: ["sh", "-c", "exec redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save \"\" --requirepass \"$${REDIS_PASSWORD}\""]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - archive
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    container_name: archive-whisper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    ports:
      - "8000:8000"
    networks:
      - archive
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 2G

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: archive-pgadmin
    restart: unless-stopped
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?Set PGADMIN_EMAIL in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "True"
      PGADMIN_CONFIG_SESSION_DB_PATH: "'/var/lib/pgadmin/sessions'"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./deploy/pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "0.0.0.0:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - archive
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: archive-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    ports:
      - "0.0.0.0:9090:9090"
    networks:
      - archive
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: archive-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_HTTPONLY: "true"
      GF_SECURITY_COOKIE_SAMESITE: "Lax"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - prometheus
    networks:
      - archive
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  ocr:
    build:
      context: ./ocr-service
    container_name: archive-ocr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      OCR_LANG: ${OCR_LANG:-ar}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      MAX_FILE_SIZE_MB: ${OCR_MAX_FILE_MB:-20}
    volumes:
      - ocr_models:/home/ocruser/.paddleocr
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8788/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  postgres_data:
    driver: local
  server_config:
    driver: local
  server_files:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  pgadmin_data:
    driver: local
  ocr_models:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  archive:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.9.0/24
    driver_opts:
      com.docker.network.driver.mtu: 1450
