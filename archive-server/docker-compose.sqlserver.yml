# Archive Suite Production Stack (SQL Server)

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: archive-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD:?Set SQLSERVER_SA_PASSWORD in .env}
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C -b || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "2"
          memory: 2G

  server:
    build:
      context: ..
      dockerfile: archive-server/Dockerfile.server
      args:
        DATABASE_PROVIDER: sqlserver
    container_name: archive-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /app/.archive-files
    environment:
      BACKEND: sqlserver
      DATABASE_PROVIDER: sqlserver
      DATABASE_URL: "${SQLSERVER_URL:-sqlserver://sqlserver:1433;database=${SQLSERVER_DB:-archive};user=sa;password=${SQLSERVER_SA_PASSWORD};encrypt=true;trustServerCertificate=true}"
      SQLSERVER_URL: "${SQLSERVER_URL:-sqlserver://sqlserver:1433;database=${SQLSERVER_DB:-archive};user=sa;password=${SQLSERVER_SA_PASSWORD};encrypt=true;trustServerCertificate=true}"
      NODE_ENV: production
      ARCHIVE_PUBLIC_DEPLOY: ${ARCHIVE_PUBLIC_DEPLOY:-1}
      API_PORT: "8787"
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_AUTH_SECRET: ${JWT_AUTH_SECRET:-}
      JWT_SHARE_SECRET: ${JWT_SHARE_SECRET:-}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}
      JWT_TTL_SEC: ${JWT_TTL_SEC:-43200}
      SHARE_EXPIRY_DAYS: ${SHARE_EXPIRY_DAYS:-30}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      RATE_LIMIT_RPC_MAX: ${RATE_LIMIT_RPC_MAX:-600}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-10}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      FILE_STORE: ${FILE_STORE:-disk}
      FILE_STORE_DIR: ${DOCKER_FILE_STORE_DIR:-/app/files}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_IMPL: ${AI_IMPL:-sdk}
      TRANSCRIBE_PROVIDER: ${TRANSCRIBE_PROVIDER:-whisper-local}
      TRANSCRIBE_BASE_URL: ${TRANSCRIBE_BASE_URL:-http://whisper:8000/v1}
      TRANSCRIBE_MODEL: ${TRANSCRIBE_MODEL:-Systran/faster-whisper-base}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr:8788}
      SERVER_CONFIG_PATH: /app/config/server-config.json
    volumes:
      - server_config:/app/config
      - server_files:/app/files
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - archive
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: archive-server/Dockerfile.frontend
    container_name: archive-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx
      - /tmp
    volumes:
      - ./nginx/postgres.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - archive

  redis:
    image: redis:7-alpine
    container_name: archive-redis
    command: ["sh", "-c", "exec redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save \"\" --requirepass \"$${REDIS_PASSWORD}\""]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - archive

volumes:
  sqlserver_data:
    driver: local
  server_config:
    driver: local
  server_files:
    driver: local

networks:
  archive:
    driver: bridge
