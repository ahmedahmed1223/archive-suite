apiVersion: v1
kind: Secret
metadata:
  name: {{ include "archive.secretName" . }}
  namespace: {{ include "archive.namespace" . }}
  labels:
    {{- include "archive.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}   # REQUIRED
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}                  # REQUIRED
  JWT_AUTH_SECRET: {{ .Values.secrets.jwtAuthSecret | quote }}
  JWT_SHARE_SECRET: {{ .Values.secrets.jwtShareSecret | quote }}
  OAUTH_STATE_SECRET: {{ .Values.secrets.oauthStateSecret | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}          # REQUIRED
  {{- if .Values.pgadmin.enabled }}
  PGADMIN_DEFAULT_EMAIL: {{ .Values.pgadmin.email | quote }}
  PGADMIN_DEFAULT_PASSWORD: {{ .Values.pgadmin.password | quote }}     # REQUIRED
  {{- end }}
