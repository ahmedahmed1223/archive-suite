apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "archive.fullname" . }}-server-files
  namespace: {{ include "archive.namespace" . }}
  labels:
    {{- include "archive.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.server.storageClass }}
  storageClassName: {{ .Values.server.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.server.filesStorage }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "archive.fullname" . }}-server-config
  namespace: {{ include "archive.namespace" . }}
  labels:
    {{- include "archive.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.server.storageClass }}
  storageClassName: {{ .Values.server.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.server.configStorage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archive.fullname" . }}-server
  namespace: {{ include "archive.namespace" . }}
  labels:
    {{- include "archive.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "archive.componentLabels" (dict "component" "server" "ctx" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "archive.componentLabels" (dict "component" "server" "ctx" .) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- include "archive.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: prisma-migrate
          image: {{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}
          imagePullPolicy: {{ .Values.image.server.pullPolicy }}
          command:
            - sh
            - -c
            - pnpm --filter archive-server run prisma:migrate
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "archive.configmapName" . }}
                  key: NODE_ENV
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "archive.configmapName" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "archive.configmapName" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "archive.configmapName" . }}
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "archive.configmapName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "archive.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?schema=public"
      containers:
        - name: server
          image: {{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}
          imagePullPolicy: {{ .Values.image.server.pullPolicy }}
          ports:
            - containerPort: {{ .Values.server.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "archive.configmapName" . }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "archive.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "archive.secretName" . }}
                  key: JWT_SECRET
            - name: JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "archive.secretName" . }}
                  key: JWT_AUTH_SECRET
            - name: JWT_SHARE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "archive.secretName" . }}
                  key: JWT_SHARE_SECRET
            - name: OAUTH_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "archive.secretName" . }}
                  key: OAUTH_STATE_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "archive.secretName" . }}
                  key: ADMIN_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?schema=public"
          volumeMounts:
            - name: server-files
              mountPath: /app/files
            - name: server-config
              mountPath: /app/config
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      volumes:
        - name: server-files
          persistentVolumeClaim:
            claimName: {{ include "archive.fullname" . }}-server-files
        - name: server-config
          persistentVolumeClaim:
            claimName: {{ include "archive.fullname" . }}-server-config
