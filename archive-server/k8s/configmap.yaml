apiVersion: v1
kind: ConfigMap
metadata:
  name: archive-config
  namespace: archive
data:
  NODE_ENV: "production"
  BACKEND: "postgres"
  API_PORT: "8787"
  ARCHIVE_PUBLIC_DEPLOY: "1"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "archive"
  POSTGRES_USER: "archive"
  FILE_STORE: "disk"
  FILE_STORE_DIR: "/app/files"
  REDIS_URL: ""  # Set to redis://redis-service:6379 to enable caching
