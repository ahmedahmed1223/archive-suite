apiVersion: v1
kind: ConfigMap
metadata:
  name: archive-config
  namespace: archive
data:
  NODE_ENV: "production"
  BACKEND: "postgres"
  API_PORT: "8787"
  ARCHIVE_PUBLIC_DEPLOY: "1"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "archive"
  POSTGRES_USER: "archive"
  DB_CONNECTION: "pgsql"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_DATABASE: "archive"
  DB_USERNAME: "archive"
  FILE_STORE: "disk"
  FILE_STORE_DIR: "/app/files"
  ARCHIVE_FILE_ROOT: "/app/storage/app/archive-files"
  QUEUE_CONNECTION: "database"
  CACHE_STORE: "redis"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://redis:6379"
  MEDIA_PROCESSOR: "real"
  WHISPER_BINARY: "faster-whisper"
  WHISPER_MODEL: "large-v3"
  WHISPER_LANGUAGE: "ar"
  WHISPER_OUTPUT_FORMAT: "vtt"
  WHISPER_DEVICE: "cuda"
  WHISPER_COMPUTE_TYPE: "float16"
  WHISPER_DIARIZE: "false"
