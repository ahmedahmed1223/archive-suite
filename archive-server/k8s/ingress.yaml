apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: archive-ingress
  namespace: archive
  annotations:
    # cert-manager will provision and renew a Let's Encrypt TLS certificate.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "256m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # SSE streams for /api/sync/events must not be buffered.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - archive.example.com   # Replace with your actual domain
      secretName: archive-tls
  rules:
    - host: archive.example.com   # Replace with your actual domain
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 8787
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
