apiVersion: v1
kind: Secret
metadata:
  name: archive-secrets
  namespace: archive
type: Opaque
# Use stringData for plain-text values — Kubernetes base64-encodes them at
# admission time.  Replace CHANGE_ME values before applying to a cluster.
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"           # REQUIRED
  JWT_SECRET: "CHANGE_ME_LONG_RANDOM_STRING" # REQUIRED — min 32 chars
  JWT_AUTH_SECRET: ""                       # Optional override for auth JWTs
  JWT_SHARE_SECRET: ""                      # Optional override for share JWTs
  OAUTH_STATE_SECRET: ""                    # Required only if OAuth is enabled
  ADMIN_PASSWORD: "CHANGE_ME"               # REQUIRED
