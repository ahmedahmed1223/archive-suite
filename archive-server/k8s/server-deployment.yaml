apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: archive
  labels:
    app: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/OWNER/archive-server:latest  # Replace OWNER with your GitHub org/user
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - pnpm --filter archive-server run prisma:migrate
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: archive-config
                  key: NODE_ENV
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: archive-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: archive-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: archive-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: archive-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?schema=public"
      containers:
        - name: server
          image: ghcr.io/OWNER/archive-server:latest  # Replace OWNER with your GitHub org/user
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8787
              name: http
          envFrom:
            - configMapRef:
                name: archive-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: JWT_SECRET
            - name: JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: JWT_AUTH_SECRET
            - name: JWT_SHARE_SECRET
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: JWT_SHARE_SECRET
            - name: OAUTH_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: OAUTH_STATE_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: ADMIN_PASSWORD
            # DATABASE_URL is built from individual components so no plaintext
            # connection string needs to be stored in the Secret.
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?schema=public"
          volumeMounts:
            - name: server-files
              mountPath: /app/files
            - name: server-config
              mountPath: /app/config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8787
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: server-files
          persistentVolumeClaim:
            claimName: server-files
        - name: server-config
          persistentVolumeClaim:
            claimName: server-config
