apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper-worker
  namespace: archive
  labels:
    app: whisper-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper-worker
  template:
    metadata:
      labels:
        app: whisper-worker
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/OWNER/archive-laravel-worker:latest  # Replace OWNER with your GitHub org/user
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: archive-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: APP_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: POSTGRES_PASSWORD
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: archive-secrets
                  key: HF_TOKEN
                  optional: true
          volumeMounts:
            - name: server-files
              mountPath: /app/storage/app/archive-files
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
              nvidia.com/gpu: "1"
      volumes:
        - name: server-files
          persistentVolumeClaim:
            claimName: server-files
