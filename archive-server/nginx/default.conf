# nginx config for the SPA front + PocketBase reverse proxy.
#
# The SPA is a single index.html (self-contained, inlined JS/CSS). All routes
# fall back to it (SPA history fallback). Calls to /pb/* are proxied to the
# pocketbase service on the internal docker network. The browser still talks
# to PocketBase via that prefix, so we keep cookies/auth on the same origin
# and avoid CORS surprises.

server {
  listen 80;
  server_name _;

  # Reasonable timeouts for an archive server (large transfers, bulk imports).
  client_max_body_size 256m;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  # PocketBase admin + REST + realtime — same-origin so cookies "just work".
  location /pb/ {
    proxy_pass http://pocketbase:8090/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Realtime uses Server-Sent Events; disable buffering so events flush live.
    proxy_buffering off;
    proxy_cache off;
  }

  # SPA static files + history fallback. The single-file build means there
  # are no chunked assets to negotiate; try_files just resolves to index.html
  # for any unknown route so the in-app router takes over.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;

    # Cache hashing isn't relevant for a single-file SPA, but explicit
    # no-cache on index.html prevents stale shells after a deploy.
    add_header Cache-Control "no-store, must-revalidate";
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
  }
}
