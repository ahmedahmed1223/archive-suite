# nginx config for the Postgres stack: SPA front + RPC API reverse proxy.
#
# Mounted over the image's default.conf by docker-compose.postgres.yml. The
# SPA's cloud-http adapter calls /api/rpc; nginx forwards it to the Node
# server on the internal docker network, keeping everything same-origin.

server {
  listen 80;
  server_name _;

  client_max_body_size 256m;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  # RPC API → Node server (Prisma + Postgres). Same-origin, no CORS needed.
  location /api/ {
    proxy_pass http://server:8787/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Realtime SSE (/api/sync/events): stream immediately, never buffer or
    # time out an idle-but-open connection.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  # SPA static files + history fallback (single-file build).
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
    add_header Cache-Control "no-store, must-revalidate";
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' wss: https:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';";
  }
}
