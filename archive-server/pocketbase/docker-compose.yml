# PocketBase dev/prod data service. Pin PB_VERSION to a real published release.
services:
  pocketbase:
    build:
      context: .
      args:
        PB_VERSION: "0.39.0"
    container_name: archive-pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb_schema.json:/pb_schema.json:ro
    restart: unless-stopped

volumes:
  pb_data:
