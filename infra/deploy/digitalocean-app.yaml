name: archive-suite
region: fra

databases:
  - name: archive-suite-db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1

services:
  - name: archive-suite-server
    dockerfile_path: archive-server/Dockerfile.server
    github:
      repo: your-org/archive-suite
      branch: master
      deploy_on_push: true
    http_port: 8787
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /api/health
    envs:
      - key: NODE_ENV
        value: production
      - key: BACKEND
        value: postgres
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        value: ${archive-suite-db.DATABASE_URL}
        type: SECRET
      - key: REDIS_URL
        value: ""
        type: SECRET
      - key: JWT_AUTH_SECRET
        value: CHANGE_ME_GENERATE_48_BYTES
        type: SECRET
      - key: JWT_SHARE_SECRET
        value: CHANGE_ME_GENERATE_48_BYTES
        type: SECRET
      - key: OAUTH_STATE_SECRET
        value: CHANGE_ME_GENERATE_48_BYTES
        type: SECRET
      - key: APP_BASE_URL
        value: ${APP_URL}
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: CHANGE_ME_STRONG_PASSWORD
        type: SECRET

  - name: archive-suite-frontend
    dockerfile_path: archive-server/Dockerfile.frontend
    github:
      repo: your-org/archive-suite
      branch: master
      deploy_on_push: true
    http_port: 8080
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /
    envs:
      - key: VITE_BACKEND
        value: cloud
      - key: VITE_API_BASE_URL
        value: ${archive-suite-server.PUBLIC_URL}
