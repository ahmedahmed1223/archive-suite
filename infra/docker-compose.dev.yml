# Dev override: HTTP-only, no Caddy. The canonical Next service is already
# exposed by docker-compose.yml on NEXT_PUBLIC_PORT (default :3000). Use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  laravel:
    ports:
      - "${LARAVEL_PUBLIC_PORT:-8000}:8000"

  caddy:
    profiles: ["disabled"]
