# Canonical Laravel + Next.js stack.
# This is the target deployment shape after the Laravel/Next cutover. The older
# Node/SPA/PocketBase compose files stay available as legacy variants only.

services:
  postgres:
    image: pgvector/pgvector:pg17@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
    container_name: archive-ln-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-archive}
    volumes:
      - laravel_next_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archive} -d ${POSTGRES_DB:-archive}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archive

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: archive-ln-redis
    restart: unless-stopped
    command: ["sh", "-c", "exec redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save \"\" --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - archive

  # V1-202: split into laravel (nginx, public-facing on :8000 — keeps the
  # `laravel:8000` DNS contract next.config/healthchecks already rely on)
  # + laravel-fpm (php-fpm, internal-only on :9000, owns migrate/seed).
  # Simplest production-grade replacement for the single-threaded `php -S`
  # dev server without a process supervisor: one image (Dockerfile.worker,
  # now php:8.4-fpm + nginx), two single-process containers.
  laravel:
    build:
      context: ../archive-laravel
      dockerfile: Dockerfile.worker
    container_name: archive-ln-laravel
    restart: unless-stopped
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      - laravel_next_storage:/app/storage/app
    depends_on:
      laravel-fpm:
        condition: service_healthy
    healthcheck:
      # Deep check: exercises nginx -> fpm -> DB/redis/storage end to end
      # (see routes/api.php's /api/v1/health for what "deep" means here).
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - archive

  laravel-fpm:
    build:
      context: ../archive-laravel
      dockerfile: Dockerfile.worker
    container_name: archive-ln-laravel-fpm
    restart: unless-stopped
    # V1-203: archive:migrate-safe wraps migrate --force with a preflight
    # check, a pre-migration backup, a maintenance window, and --isolated
    # locking so two containers can't double-migrate. See
    # archive-laravel/app/Console/Commands/MigrateSafe.php.
    command: ["sh", "-c", "php artisan archive:migrate-safe && php artisan db:seed --force && exec php-fpm"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${LARAVEL_APP_KEY:?Set LARAVEL_APP_KEY in .env}
      APP_URL: ${LARAVEL_APP_URL:-http://localhost:8000}
      ARCHIVE_SECURE_COOKIES: ${ARCHIVE_SECURE_COOKIES:-false}
      # V1-101: db:seed --force refuses to run in production without these
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_NAME: ${ADMIN_NAME:-Archive Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-archive}
      DB_USERNAME: ${POSTGRES_USER:-archive}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDIS_PORT: "6379"
      MEDIA_PROCESSOR: real
      WHISPER_BINARY: ${WHISPER_BINARY:-whisper-ctranslate2}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ar}
      WHISPER_OUTPUT_FORMAT: ${WHISPER_OUTPUT_FORMAT:-vtt}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_DIARIZE: ${WHISPER_DIARIZE:-false}
      HF_TOKEN: ${HF_TOKEN:-}
      OCR_SERVICE_URL: http://ocr:8788
    volumes:
      - laravel_next_storage:/app/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Shallow on purpose: just "is php-fpm accepting connections". The
      # deep functional check lives on the public-facing `laravel` (nginx)
      # healthcheck above so it isn't done twice.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - archive

  laravel-worker:
    build:
      context: ../archive-laravel
      dockerfile: Dockerfile.worker
    container_name: archive-ln-laravel-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--queue=default", "--sleep=1", "--tries=3", "--max-jobs=1000", "--max-time=3600"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${LARAVEL_APP_KEY:?Set LARAVEL_APP_KEY in .env}
      ARCHIVE_SECURE_COOKIES: ${ARCHIVE_SECURE_COOKIES:-false}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-archive}
      DB_USERNAME: ${POSTGRES_USER:-archive}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDIS_PORT: "6379"
      MEDIA_PROCESSOR: real
      WHISPER_BINARY: ${WHISPER_BINARY:-whisper-ctranslate2}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ar}
      WHISPER_OUTPUT_FORMAT: ${WHISPER_OUTPUT_FORMAT:-vtt}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_DIARIZE: ${WHISPER_DIARIZE:-false}
      HF_TOKEN: ${HF_TOKEN:-}
      OCR_SERVICE_URL: http://ocr:8788
    volumes:
      - laravel_next_storage:/app/storage/app
    depends_on:
      laravel-fpm:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Inspect PID 1 directly: the exec-form command makes the real queue
      # worker PID 1, while [q] prevents the probe text matching itself.
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q '[q]ueue:work'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - archive

  ocr:
    build:
      context: ./ocr-service
    container_name: archive-ln-ocr
    restart: unless-stopped
    environment:
      OCR_LANG: ${OCR_LANG:-ar}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      MAX_FILE_SIZE_MB: ${OCR_MAX_FILE_SIZE_MB:-20}
      PORT: "8788"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - archive

  laravel-reverb:
    build:
      context: ../archive-laravel
      dockerfile: Dockerfile.worker
    container_name: archive-ln-laravel-reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${LARAVEL_APP_KEY:?Set LARAVEL_APP_KEY in .env}
      ARCHIVE_SECURE_COOKIES: ${ARCHIVE_SECURE_COOKIES:-false}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-archive}
      DB_USERNAME: ${POSTGRES_USER:-archive}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # match laravel/worker — avoids hitting the DB cache table before migrations run
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDIS_PORT: "6379"
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:?Set REVERB_APP_ID in .env}
      REVERB_APP_KEY: ${REVERB_APP_KEY:?Set REVERB_APP_KEY in .env}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:?Set REVERB_APP_SECRET in .env}
      REVERB_HOST: ${REVERB_HOST:-localhost}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: "8080"
    ports:
      - "${REVERB_SERVER_PUBLISHED_PORT:-8080}:8080"
    depends_on:
      laravel-fpm:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # TCP-only readiness: Reverb expects a websocket upgrade, so a plain
      # HTTP probe just returns 4xx noise. bash's /dev/tcp is enough to
      # prove the listener is up without adding a package.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - archive

  next:
    build:
      context: ..
      dockerfile: archive-next/Dockerfile
      args:
        ARCHIVE_API_BASE_URL: http://laravel:8000/api/v1
        NEXT_PUBLIC_REVERB_APP_KEY: ${REVERB_APP_KEY:?Set REVERB_APP_KEY in .env}
        NEXT_PUBLIC_REVERB_HOST: ${REVERB_HOST:-localhost}
        NEXT_PUBLIC_REVERB_PORT: ${REVERB_PORT:-8080}
        NEXT_PUBLIC_REVERB_SCHEME: ${REVERB_SCHEME:-http}
    container_name: archive-ln-next
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      ARCHIVE_API_BASE_URL: http://laravel:8000/api/v1
      NEXT_PUBLIC_REVERB_APP_KEY: ${REVERB_APP_KEY:?Set REVERB_APP_KEY in .env}
      NEXT_PUBLIC_REVERB_HOST: ${REVERB_HOST:-localhost}
      NEXT_PUBLIC_REVERB_PORT: ${REVERB_PORT:-8080}
      NEXT_PUBLIC_REVERB_SCHEME: ${REVERB_SCHEME:-http}
    ports:
      - "${NEXT_PUBLIC_PORT:-3000}:3000"
    depends_on:
      laravel:
        condition: service_healthy
      laravel-reverb:
        condition: service_healthy
    networks:
      - archive

volumes:
  laravel_next_postgres_data:
  laravel_next_storage:

networks:
  archive:
    driver: bridge
