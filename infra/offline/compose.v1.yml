name: archive-suite-${ARCHIVE_VERSION:?Set ARCHIVE_VERSION}

x-laravel-env: &laravel-env
  APP_ENV: production
  APP_DEBUG: "false"
  ARCHIVE_SECURE_COOKIES: "true"
  APP_KEY: ${LARAVEL_APP_KEY:?Generate .env first}
  APP_URL: ${LARAVEL_APP_URL:-http://localhost}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ${POSTGRES_DB:-archive}
  DB_USERNAME: ${POSTGRES_USER:-archive}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?Generate .env first}
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: database
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:?Generate .env first}
  REDIS_PORT: "6379"
  REVERB_APP_ID: ${REVERB_APP_ID:?Generate .env first}
  REVERB_APP_KEY: ${REVERB_APP_KEY:?Generate .env first}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:?Generate .env first}
  REVERB_HOST: ${REVERB_HOST:-localhost}
  REVERB_PORT: ${REVERB_PORT:-8080}
  REVERB_SCHEME: ${REVERB_SCHEME:-http}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-}
  ADMIN_NAME: ${ADMIN_NAME:-Archive Admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

services:
  postgres:
    image: archive-suite/postgres:${ARCHIVE_VERSION}
    pull_policy: never
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Generate .env first}
      POSTGRES_DB: ${POSTGRES_DB:-archive}
    volumes: [postgres_data:/var/lib/postgresql]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archive} -d ${POSTGRES_DB:-archive}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: archive-suite/redis:${ARCHIVE_VERSION}
    pull_policy: never
    command: ["sh", "-c", "exec redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    environment: { REDIS_PASSWORD: "${REDIS_PASSWORD:?Generate .env first}" }
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
  laravel-fpm:
    image: archive-suite/laravel:${ARCHIVE_VERSION}
    pull_policy: never
    command: ["sh", "-c", "php artisan archive:migrate-safe && php artisan db:seed --force && exec php-fpm"]
    environment: *laravel-env
    volumes: [storage:/app/storage/app]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  laravel:
    image: archive-suite/laravel:${ARCHIVE_VERSION}
    pull_policy: never
    command: ["nginx", "-g", "daemon off;"]
    volumes: [storage:/app/storage/app]
    depends_on: { laravel-fpm: { condition: service_started } }
  laravel-worker:
    image: archive-suite/laravel:${ARCHIVE_VERSION}
    pull_policy: never
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3"]
    environment: *laravel-env
    volumes: [storage:/app/storage/app]
    depends_on: { laravel-fpm: { condition: service_started } }
  laravel-reverb:
    image: archive-suite/laravel:${ARCHIVE_VERSION}
    pull_policy: never
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      <<: *laravel-env
      BROADCAST_CONNECTION: reverb
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: "8080"
    depends_on: { laravel-fpm: { condition: service_started } }
  next:
    image: archive-suite/next:${ARCHIVE_VERSION}
    pull_policy: never
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      ARCHIVE_API_BASE_URL: http://laravel:8000/api/v1
    depends_on: { laravel: { condition: service_started } }
  caddy:
    image: archive-suite/caddy:${ARCHIVE_VERSION}
    pull_policy: never
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      CADDY_UPSTREAM: next:3000
    ports: ["${HTTP_PORT:-80}:80", "${HTTPS_PORT:-443}:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: { next: { condition: service_started } }

volumes:
  postgres_data:
  storage:
  caddy_data:
  caddy_config:
